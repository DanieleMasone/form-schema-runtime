name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag and package metadata
        run: node scripts/verify-release.mjs --tag "${{ github.event.release.tag_name }}"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Coverage report
        run: npm run test:coverage

      - name: Build package and docs
        run: npm run build

      - name: Consumer smoke test
        run: npm run test:consumer

      - name: Verify package contents
        run: node scripts/verify-release.mjs --tag "${{ github.event.release.tag_name }}" --pack

      - name: npm pack dry run
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
